<script>    /* Float Label Pattern Plugin for Bootstrap 3.1.0 by Travis Wilson
**************************************************/

 $('#conta').mask('00000-0');
(function ($) {
    $.fn.floatLabels = function (options) {

        // Settings
        var self = this;
        var settings = $.extend({}, options);


        // Event Handlers
        function registerEventHandlers() {
            self.on('input keyup change', 'input, textarea', function () {
                actions.swapLabels(this);
            });
        }


        // Actions
        var actions = {
            initialize: function() {
                self.each(function () {
                    var $this = $(this);
                    var $label = $this.children('label');
                    var $field = $this.find('input,textarea').first();

                    if ($this.children().first().is('label')) {
                        $this.children().first().remove();
                        $this.append($label);
                    }

                    var placeholderText = ($field.attr('placeholder') && $field.attr('placeholder') != $label.text()) ? $field.attr('placeholder') : $label.text();

                    $label.data('placeholder-text', placeholderText);
                    $label.data('original-text', $label.text());

                    if ($field.val() == '') {
                        $field.addClass('empty')
                    }
                });
            },
            swapLabels: function (field) {
                var $field = $(field);
                var $label = $(field).siblings('label').first();
                var isEmpty = Boolean($field.val());

                if (isEmpty) {
                    $field.removeClass('empty');
                    $label.text($label.data('original-text'));
                }
                else {
                    $field.addClass('empty');
                    $label.text($label.data('placeholder-text'));
                }
            }
        }


        // Initialization
        function init() {
            registerEventHandlers();

            actions.initialize();
            self.each(function () {
                actions.swapLabels($(this).find('input,textarea').first());
            });
        }
        init();


        return this;
    };

    $(function () {
        $('.float-label-control').floatLabels();
    });
})(jQuery);

    function maskTrak(format, field)
{
    var result = "";
    var maskIdx = format.length - 1;
    var error = false;
    var valor = field.value;
    var posFinal = false;
    if( field.setSelectionRange ) 
    {
        if(field.selectionStart == valor.length)
            posFinal = true;
    }
    valor = valor.replace(/[^0123456789Xx]/g,'')
    for (var valIdx = valor.length - 1; valIdx >= 0 && maskIdx >= 0; --maskIdx)
    {
        var chr = valor.charAt(valIdx);
        var chrMask = format.charAt(maskIdx);
        switch (chrMask)
        {
        case '#':
            if(!(/\d/.test(chr)))
                error = true;
            result = chr + result;
            --valIdx;
            break;
        case '@':
            result = chr + result;
            --valIdx;
            break;
        default:
            result = chrMask + result;
        }
    }

    field.value = result;
    field.style.color = error ? 'red' : '';
    if(posFinal)
    {
        field.selectionStart = result.length;
        field.selectionEnd = result.length;
    }
    return result;
}

function trata( valor,  isOnBlur ) {
                    
    valor = valor.replace(/\D/g,"");                        
    valor = valor.replace(/^(\d{2})(\d)/g,"($1)$2");        
                    
    if( isOnBlur ) {
                        
    valor = valor.replace(/(\d)(\d{4})$/,"$1-$2");   
                    } else {

                        valor = valor.replace(/(\d)(\d{3})$/,"$1-$2"); 
                    }
                    return valor;
                }
                
                campo.onkeypress = function (evt) {
                     
                    var code = (window.event)? window.event.keyCode : evt.which;    
                    var valor = this.value
                    
                    if(code > 57 || (code < 48 && code != 8 ))  {
                        return false;
                    } else {
                        this.value = trata(valor, false);
                    }
                }
                
                campo.onblur = function() {
                    
                    var valor = this.value;
                    if( valor.length < 13 ) {
                        this.value = ""
                    }else {     
                        this.value = trata( this.value, true );
                    }
                }
                
                campo.maxLength = 14;
            }
}
